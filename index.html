<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HLY FUL</title>
<meta name="description" content="Holy Fool. Heilig voll.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0A0A0A;
  color: #F0EDE6;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== VIDEO ===== */
.video-section {
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 2rem 1rem 0;
  opacity: 0;
  animation: fadeIn 2s ease-out 0.3s forwards;
}

.video-frame {
  position: relative;
  width: 100%;
  max-width: 540px;
  overflow: hidden;
  border: 1px solid rgba(198,163,78,0.12);
}

.video-frame video {
  display: block;
  width: 100%;
  height: auto;
}

.video-fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(to bottom, transparent, #0A0A0A);
  pointer-events: none;
}

/* ===== MAIN CONTENT ===== */
.main {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 2rem 1.5rem 5rem;
}

/* ===== BELL ===== */
.bell-wrap {
  margin-bottom: 2rem;
  opacity: 0;
  animation: fadeIn 2s ease-out 0.8s forwards;
}

#bell-element {
  display: block;
  width: 80px;
  height: 100px;
  transform-origin: top center;
  animation: sway 5s ease-in-out infinite;
}

#bell-element.ringing {
  animation: ring 0.25s ease-in-out 8 !important;
}

@keyframes sway {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(2.5deg); }
  75% { transform: rotate(-2.5deg); }
}

@keyframes ring {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(15deg); }
  75% { transform: rotate(-15deg); }
}

/* ===== BRAND TEXT ===== */
.brand {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(2.5rem, 12vw, 5.5rem);
  letter-spacing: 0.3em;
  margin-bottom: 1.2rem;
  opacity: 0;
  animation: fadeIn 0.5s ease-out 1.2s forwards;
  min-height: 1.2em;
}

.brand span {
  display: inline-block;
  min-width: 0.55em;
  text-align: center;
  color: rgba(198,163,78,0.35);
  transition: color 0.4s ease;
}

.brand span.done { color: #F0EDE6; }
.brand span.gap { min-width: 0.3em; }

/* ===== TAGLINE ===== */
.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(0.85rem, 3vw, 1.1rem);
  letter-spacing: 0.12em;
  color: #C6A34E;
  margin-bottom: 0.5rem;
  opacity: 0;
  animation: fadeIn 1.5s ease-out 2s forwards;
}

.divider {
  width: 30px;
  height: 1px;
  background: rgba(198,163,78,0.2);
  margin: 0 auto 2rem;
  opacity: 0;
  animation: fadeIn 1.5s ease-out 2.2s forwards;
}

.coming {
  font-size: 0.7rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #888;
  font-weight: 200;
  margin-bottom: 2.5rem;
  opacity: 0;
  animation: fadeIn 1.5s ease-out 2.4s forwards;
}

/* ===== FORM ===== */
.form-box {
  width: 100%;
  max-width: 380px;
  opacity: 0;
  animation: fadeUp 1.5s ease-out 2.8s forwards;
}

.form-row {
  display: flex;
  border: 1px solid rgba(198,163,78,0.25);
  transition: border-color 0.3s ease;
}

.form-row:focus-within { border-color: #C6A34E; }

.form-row input {
  flex: 1;
  padding: 0.85rem 1rem;
  background: transparent;
  border: none;
  color: #F0EDE6;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: 0.85rem;
  outline: none;
}

.form-row input::placeholder { color: rgba(208,208,208,0.25); }

.form-row button {
  padding: 0.85rem 1.2rem;
  background: transparent;
  border: none;
  border-left: 1px solid rgba(198,163,78,0.25);
  color: #C6A34E;
  font-family: 'Outfit', sans-serif;
  font-weight: 300;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.3s ease;
  white-space: nowrap;
}

.form-row button:hover { background: rgba(198,163,78,0.08); }
.form-row button:disabled { opacity: 0.4; cursor: not-allowed; }

.msg {
  margin-top: 0.8rem;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  min-height: 1.2rem;
}

.msg.ok { color: #C6A34E; }
.msg.err { color: #8B4444; }

/* ===== BOTTOM ===== */
.bottom {
  text-align: center;
  padding: 0 1rem 2.5rem;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(136,136,136,0.35);
  font-weight: 200;
  opacity: 0;
  animation: fadeIn 1.5s ease-out 3.2s forwards;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== MOBILE ===== */
@media (max-width: 480px) {
  .video-section { padding: 1rem 0 0; }
  .video-frame { border: none; }
  .brand { letter-spacing: 0.2em; }
  .form-row { flex-direction: column; }
  .form-row button {
    border-left: none;
    border-top: 1px solid rgba(198,163,78,0.25);
    padding: 0.9rem;
  }
  .main { padding: 1.5rem 1.2rem 4rem; }
}
</style>
</head>
<body>

<!-- VIDEO -->
<div class="video-section">
  <div class="video-frame">
    <video autoplay muted loop playsinline>
      <source src="hlyful-hero.mp4" type="video/mp4">
    </video>
    <div class="video-fade"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- BELL — simple shapes only, inline colors, no CSS classes -->
  <div class="bell-wrap">
    <svg id="bell-element" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Hook at top -->
      <circle cx="40" cy="8" r="5" fill="none" stroke="#C6A34E" stroke-width="2"/>
      <!-- Connector -->
      <rect x="38" y="13" width="4" height="10" rx="1" fill="#C6A34E"/>
      <!-- Bell body — simple trapezoid shape -->
      <polygon points="20,70 60,70 52,23 28,23" fill="rgba(198,163,78,0.1)" stroke="#C6A34E" stroke-width="2" stroke-linejoin="round"/>
      <!-- Rounded bottom of bell -->
      <ellipse cx="40" cy="70" rx="20" ry="5" fill="rgba(198,163,78,0.1)" stroke="#C6A34E" stroke-width="2"/>
      <!-- Clapper rod -->
      <rect x="39" y="55" width="2" height="22" fill="#C6A34E"/>
      <!-- Clapper ball -->
      <circle cx="40" cy="80" r="4" fill="#C6A34E"/>
      <!-- Crack line -->
      <polyline points="36,32 38,42 34,52 37,62" fill="none" stroke="#C6A34E" stroke-width="0.8" opacity="0.35"/>
    </svg>
  </div>

  <!-- BRAND -->
  <h1 class="brand" id="brand"></h1>

  <!-- TAGLINE -->
  <p class="tagline">Holy Fool. Heilig voll.</p>
  <div class="divider"></div>
  <p class="coming">Coming Soon</p>

  <!-- FORM -->
  <div class="form-box">
    <div class="form-row" id="form">
      <input type="email" id="email" placeholder="Deine E-Mail" required>
      <button type="button" id="btn" onclick="submit()">Erfahre es zuerst</button>
    </div>
    <p class="msg" id="msg"></p>
  </div>

</div>

<div class="bottom">Wer hier landet, war nie verloren.</div>

<script>
// ===== SCRAMBLE DECODE =====
(function(){
  var word = 'HLY FUL';
  var el = document.getElementById('brand');
  var abc = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  var spans = [];

  for (var i = 0; i < word.length; i++) {
    var s = document.createElement('span');
    if (word[i] === ' ') {
      s.className = 'gap';
      s.innerHTML = '\u00A0';
      s.setAttribute('data-done', '1');
    } else {
      s.textContent = abc[Math.floor(Math.random() * 26)];
      s.setAttribute('data-done', '0');
      s.setAttribute('data-char', word[i]);
      s.setAttribute('data-n', '0');
    }
    spans.push(s);
    el.appendChild(s);
  }

  setTimeout(function(){
    var timer = setInterval(function(){
      var allDone = true;
      for (var i = 0; i < spans.length; i++) {
        if (spans[i].getAttribute('data-done') === '1') continue;
        var n = parseInt(spans[i].getAttribute('data-n')) + 1;
        spans[i].setAttribute('data-n', n);
        var lock = 8 + i * 7;
        if (n >= lock) {
          spans[i].textContent = spans[i].getAttribute('data-char');
          spans[i].className = 'done';
          spans[i].setAttribute('data-done', '1');
        } else {
          spans[i].textContent = abc[Math.floor(Math.random() * 26)];
          allDone = false;
        }
      }
      if (allDone) clearInterval(timer);
    }, 55);
  }, 1400);
})();

// ===== BELL RING =====
function ringTheBell() {
  var b = document.getElementById('bell-element');
  b.classList.add('ringing');
  setTimeout(function(){ b.classList.remove('ringing'); }, 2200);
}

// ===== FORM SUBMIT =====
function submit() {
  var email = document.getElementById('email').value.trim();
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');
  if (!email) return;

  btn.disabled = true;
  btn.textContent = '...';
  msg.textContent = '';
  msg.className = 'msg';

  fetch('/.netlify/functions/subscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email })
  })
  .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
  .then(function(res) {
    if (res.data.status === 'ok') {
      msg.textContent = 'Der Narr merkt sich das.';
      msg.className = 'msg ok';
      document.getElementById('email').value = '';
      ringTheBell();
    } else if (res.data.status === 'duplicate') {
      msg.textContent = 'Du bist bereits dabei.';
      msg.className = 'msg ok';
      ringTheBell();
    } else {
      throw new Error(res.data.error || 'Fehler');
    }
  })
  .catch(function() {
    msg.textContent = 'Etwas ging schief. Versuch es nochmal.';
    msg.className = 'msg err';
  })
  .finally(function() {
    btn.disabled = false;
    btn.textContent = 'Erfahre es zuerst';
  });
}
</script>
</body>
</html>
